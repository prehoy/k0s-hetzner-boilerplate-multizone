apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:YOUR_ORG/infra.git
    targetRevision: main
    path: gitops/base/tetragon
  destination:
    server: https://kubernetes.default.svc
    namespace: tetragon
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply: large RBAC/config apply cleanly; operator manages CRDs out-of-band (not pruned).
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
