apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  # App-of-apps: this is the ONLY Application applied by hand. It syncs every
  # child Application under gitops/apps, which in turn deploy the platform
  # components and workloads. (argocd.yaml is DEFERRED — kept as .deferred so this
  # recurse does not pick it up until Phase 4.)
  source:
    repoURL: git@github.com:YOUR_ORG/infra.git
    targetRevision: main
    path: gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
