# KeyDB StatefulSet: 3 pods, each = keydb + sentinel sidecar. Per-pod RWO volume (nfs-client),
# spread across nodes (anti-affinity) on the static pool. Master/replica role is resolved at start
# by keydb-start.sh via Sentinel (see config.yaml).
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: keydb-ha, namespace: data }
spec:
  serviceName: keydb-ha
  replicas: 3
  podManagementPolicy: Parallel
  selector: { matchLabels: { app: keydb-ha } }
  template:
    metadata: { labels: { app: keydb-ha } }
    spec:
      nodeSelector: { node-pool: static }     # off control-plane + off cull-able cas nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:   # soft: spread across nodes, but a lost node mustn't strand a pod
            - weight: 100
              podAffinityTerm:
                labelSelector: { matchLabels: { app: keydb-ha } }
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: keydb
          image: eqalpha/keydb:x86_64_v6.3.4
          command: ["sh", "/scripts/keydb-start.sh"]
          ports: [ { containerPort: 6379, name: keydb } ]
          env:
            - { name: POD_NAME,      valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: KEYDB_PASSWORD, valueFrom: { secretKeyRef: { name: keydb-secret, key: KEYDB_PASSWORD } } }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
            - { name: conf,    mountPath: /etc/keydb }
            - { name: data,    mountPath: /data }
          readinessProbe:
            exec: { command: ["sh","-c","keydb-cli -a \"$KEYDB_PASSWORD\" ping | grep -q PONG"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "2",    memory: "512Mi" }   # server-threads 2; carries all ~100 clients after consolidation
        - name: sentinel
          image: eqalpha/keydb:x86_64_v6.3.4
          command: ["sh", "/scripts/sentinel-start.sh"]
          ports: [ { containerPort: 26379, name: sentinel } ]
          env:
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: KEYDB_PASSWORD, valueFrom: { secretKeyRef: { name: keydb-secret, key: KEYDB_PASSWORD } } }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
          resources:
            requests: { cpu: "20m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "64Mi" }
      volumes:
        - { name: scripts, configMap: { name: keydb-ha-scripts, defaultMode: 0755 } }
        - { name: conf,    configMap: { name: keydb-ha-conf } }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: nfs-client
        resources: { requests: { storage: 2Gi } }
