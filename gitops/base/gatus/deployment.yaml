apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: gatus
  labels:
    app: gatus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      affinity:                       # off the 4GB control-plane nodes
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: node-role.kubernetes.io/control-plane, operator: DoesNotExist }
      containers:
        - name: gatus
          image: ghcr.io/twin/gatus:v5.36.0
          env:
            - name: GATUS_CONFIG_PATH
              value: /config/config.yaml
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gatus-smtp
                  key: SMTP_PASSWORD
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gatus-smtp
                  key: PUSHOVER_APP_TOKEN
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: gatus-smtp
                  key: PUSHOVER_USER_KEY
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: gatus-config
