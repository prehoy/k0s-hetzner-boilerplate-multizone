apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Cloudflare API token for Traefik's ACME DNS-01 challenge. Traefik itself is a
# manual Helm release (cluster-setup/traefik/values.yaml), but this secret is
# GitOps-managed so a cluster rebuild restores it automatically.
resources:
  - sealedsecret-cloudflare.yaml
