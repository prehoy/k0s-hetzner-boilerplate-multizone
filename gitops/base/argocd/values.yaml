# ArgoCD Helm values — PROD.
# KSOPS removed: secrets are handled by the sealed-secrets controller, so the
# repo-server no longer needs the ksops initContainer, the age key mount, or the
# kustomize alpha-plugin wiring (the old prod values used a wget initContainer +
# KSOPS — both dropped here).

# Keep ArgoCD off the 4GB control-plane nodes (they OOM-flapped under app load, 2026-06-19) and off
# cull-able cas-pool nodes — pin to the stable static worker pool, like other critical stateful apps.
global:
  nodeSelector:
    node-pool: static

redis-ha:
  enabled: true
  # redis-ha is a subchart; global.nodeSelector doesn't propagate to it, so set it explicitly.
  nodeSelector:
    node-pool: static

controller:
  replicas: 1

server:
  replicas: 2
  insecure: true

repoServer:
  replicas: 2
  imagePullSecrets:
    - name: dockerhub-cred

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: "true"
