# PodDisruptionBudgets for ArgoCD's HA components, so a node drain / pod eviction (cluster scale-down
# or the kubelet evicting under pressure) can't take down all replicas at once. maxUnavailable:1 lets
# disruptions proceed one pod at a time while keeping the service up. Standalone (not via the argo-cd
# Helm values) to avoid re-rendering/rolling repo-server. CapRover apps are replicas:1 -> no PDB
# (a PDB there would just block drains); add one alongside an HPA when an app goes multi-replica.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: argocd-server, namespace: argocd }
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app.kubernetes.io/instance: argocd, app.kubernetes.io/name: argocd-server }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: argocd-repo-server, namespace: argocd }
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app.kubernetes.io/instance: argocd, app.kubernetes.io/name: argocd-repo-server }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: argocd-applicationset-controller, namespace: argocd }
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app.kubernetes.io/instance: argocd, app.kubernetes.io/name: argocd-applicationset-controller }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: argocd-redis-ha-haproxy, namespace: argocd }
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app: redis-ha-haproxy, component: haproxy, release: argocd }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: argocd-redis-ha-server, namespace: argocd }
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app: redis-ha, release: argocd }
