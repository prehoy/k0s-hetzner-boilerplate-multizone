# HyperDX app — UI (3000) + API (8000) + OpAMP (4320). UI fronted by Traefik at logs.example.com.
# Secret-bearing env (MONGO_URI, the ClickHouse app password in DEFAULT_CONNECTIONS) is built with
# $(VAR) interpolation from SealedSecret-injected env vars, so no plaintext lands in git.
apiVersion: v1
kind: Service
metadata:
  name: hyperdx
  namespace: observability
spec:
  selector:
    app: hyperdx
  ports:
    - { name: app, port: 3000, targetPort: 3000 }
    - { name: api, port: 8000, targetPort: 8000 }
    - { name: opamp, port: 4320, targetPort: 4320 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperdx
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperdx
  template:
    metadata:
      labels:
        app: hyperdx
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z mongodb 27017 && nc -z clickhouse 8123; do echo waiting for mongo+clickhouse; sleep 3; done"
      containers:
        - name: hyperdx
          image: docker.hyperdx.io/hyperdx/hyperdx:2.28.0
          envFrom:
            - configMapRef:
                name: hyperdx-config
            - secretRef:
                name: hyperdx-secrets        # HYPERDX_API_KEY, *_PASSWORD
          env:
            # define password vars first so the $(...) refs below resolve
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef: { name: hyperdx-secrets, key: MONGODB_PASSWORD }
            - name: CLICKHOUSE_APP_PASSWORD
              valueFrom:
                secretKeyRef: { name: hyperdx-secrets, key: CLICKHOUSE_APP_PASSWORD }
            - name: MONGO_URI
              value: "mongodb://hyperdx:$(MONGODB_PASSWORD)@mongodb:27017/hyperdx?authSource=admin"
            - name: DEFAULT_CONNECTIONS
              value: |-
                [{"name":"Local ClickHouse","host":"http://clickhouse:8123","port":8123,"username":"app","password":"$(CLICKHOUSE_APP_PASSWORD)"}]
            - name: DEFAULT_SOURCES
              value: |-
                [{"from":{"databaseName":"default","tableName":"otel_logs"},"kind":"log","timestampValueExpression":"TimestampTime","name":"Logs","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local ClickHouse","traceSourceId":"Traces","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"default","tableName":"otel_traces"},"kind":"trace","timestampValueExpression":"Timestamp","name":"Traces","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"SpanName","serviceNameExpression":"ServiceName","bodyExpression":"SpanName","eventAttributesExpression":"SpanAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName","traceIdExpression":"TraceId","spanIdExpression":"SpanId","durationExpression":"Duration","durationPrecision":9,"parentSpanIdExpression":"ParentSpanId","spanNameExpression":"SpanName","spanKindExpression":"SpanKind","statusCodeExpression":"StatusCode","statusMessageExpression":"StatusMessage","connection":"Local ClickHouse","logSourceId":"Logs","sessionSourceId":"Sessions","metricSourceId":"Metrics"},{"from":{"databaseName":"default","tableName":""},"kind":"metric","timestampValueExpression":"TimeUnix","name":"Metrics","resourceAttributesExpression":"ResourceAttributes","metricTables":{"gauge":"otel_metrics_gauge","histogram":"otel_metrics_histogram","sum":"otel_metrics_sum"},"connection":"Local ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","sessionSourceId":"Sessions"},{"from":{"databaseName":"default","tableName":"hyperdx_sessions"},"kind":"session","timestampValueExpression":"TimestampTime","name":"Sessions","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local ClickHouse","logSourceId":"Logs","traceSourceId":"Traces","metricSourceId":"Metrics"}]
          ports:
            - { name: app, containerPort: 3000 }
            - { name: api, containerPort: 8000 }
            - { name: opamp, containerPort: 4320 }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
