# RBAC for the node log agent's k8sattributes processor (reads pod/namespace metadata to tag logs).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-logs-agent
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-logs-agent
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-logs-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-logs-agent
subjects:
  - kind: ServiceAccount
    name: otel-logs-agent
    namespace: observability
