apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
# cloud-init.yaml is NOT a k8s manifest — it's the canonical source for the join cloud-init that
# seal.sh renders into HCLOUD_CLUSTER_CONFIG. Do not add it here.
resources:
  - rbac.yaml
  - deployment.yaml
  - sealedsecret.yaml
  - ghost-reaper.yaml
