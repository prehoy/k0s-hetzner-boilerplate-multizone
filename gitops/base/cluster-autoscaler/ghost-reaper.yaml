# Ghost-node reaper. There is NO hcloud cloud-controller-manager in this cluster, so when the
# cluster-autoscaler deletes a burst server the orphaned k8s Node object is never garbage-collected:
# it lingers as NotReady forever, blocking CAS bookkeeping and firing TargetDown (its node-exporter
# scrape stays `up == 0`). This CronJob reaps those ghosts every 10m: for each NotReady `cas-pool-*`
# node it cross-checks the hcloud API by the node's provider-id; if the server returns 404 (truly
# gone) it deletes the Node object. The hcloud check is the safety gate — a node that is merely
# transiently NotReady (server still exists) is left alone.
#
# ponytail: a 10-line reaper instead of running a full cloud-controller-manager. Revisit only if we
# ever need real CCM features (LoadBalancer services, node address management).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghost-reaper
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ghost-reaper
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ghost-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ghost-reaper
subjects:
  - kind: ServiceAccount
    name: ghost-reaper
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ghost-reaper
  namespace: kube-system
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: ghost-reaper
          restartPolicy: Never
          affinity:                       # never run on the burst pool we might be reaping
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - { key: node-pool, operator: NotIn, values: ["burst"] }
          containers:
            - name: reaper
              image: alpine/k8s:1.34.1     # bundles kubectl + curl
              env:
                - name: HCLOUD_TOKEN
                  valueFrom:
                    secretKeyRef: { name: cluster-autoscaler-hcloud, key: HCLOUD_TOKEN }
              resources:
                requests: { cpu: "10m", memory: "32Mi" }
                limits: { cpu: "100m", memory: "64Mi" }
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  # name<TAB>providerID<TAB>ReadyStatus  for every node
                  kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.providerID}{"\t"}{range .status.conditions[?(@.type=="Ready")]}{.status}{end}{"\n"}{end}' \
                  | while IFS="$(printf '\t')" read -r name pid ready; do
                      case "$name" in cas-pool-*) ;; *) continue ;; esac   # only ever touch burst nodes
                      [ "$ready" = "True" ] && continue                    # healthy node, skip
                      id="${pid#hcloud://}"
                      if [ -z "$id" ]; then echo "skip $name: no provider-id"; continue; fi
                      code="$(curl -s -o /dev/null -w '%{http_code}' \
                               -H "Authorization: Bearer $HCLOUD_TOKEN" \
                               "https://api.hetzner.cloud/v1/servers/$id")"
                      if [ "$code" = "404" ]; then
                        echo "REAP $name: server $id gone (404)"; kubectl delete node "$name"
                      else
                        echo "keep $name: server $id http=$code (not 404)"
                      fi
                    done
