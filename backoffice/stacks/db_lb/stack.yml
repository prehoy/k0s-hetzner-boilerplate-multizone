# db_lb — Patroni leader/replica TCP router for the prod backoffice Swarm (HAProxy).
# Gives Swarm services (e.g. Databasus) a stable, failover-following Postgres endpoint:
#   db-lb:5432  -> current leader  (writes)
#   db-lb:5433  -> replicas        (reads / backups — keeps load off the primary)
# Reaches Patroni at 10.0.0.100-102 over the private network. Session-level (plain TCP),
# so pg_dump works (unlike a transaction pooler). Config: ./haproxy.cfg.
#
# On the shared `traefik-public` overlay (no traefik labels, so it's not exposed) with a
# `db-lb` alias, so Databasus — already on that network — resolves `db-lb` by name.
version: "3.8"

services:
  db-lb:
    # HAProxy Technologies' image on GHCR (identical entrypoint + config path as docker.io/haproxy)
    # — avoids Docker Hub's unauthenticated pull rate limit, which the prod box's IP hits.
    image: ghcr.io/haproxytech/haproxy-docker-alpine:3.1
    environment:
      # Bind-mounted haproxy.cfg content changes aren't a Swarm spec change on their own;
      # this forces a task restart on config edits (same trick as gatus). Set by the reconciler.
      - RECONCILE_HASH=${STACK_HASH:-0}
    volumes:
      - /opt/infra/backoffice/stacks/db_lb/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      traefik-public:
        aliases:
          - db-lb
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  traefik-public:
    external: true
