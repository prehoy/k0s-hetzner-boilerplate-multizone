# TCP router for the prod Patroni Postgres cluster (10.0.0.100-102), mirroring staging's
# db_lb for the prod backoffice Swarm. Follows the live leader via Patroni's REST health
# checks on :8008 (plain HTTP):
#   GET /primary -> 200 only on the leader   -> :5432 (writes)
#   GET /replica -> 200 on replicas          -> :5433 (reads/backups)
# So clients (e.g. Databasus) connect to a single stable endpoint and never guess the node.
global
    maxconn 4000

defaults
    log global
    mode tcp
    retries 2
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s
    option clitcpka
    option srvtcpka

listen stats
    mode http
    bind *:7654
    stats enable
    stats uri /

listen primary
    bind *:5432
    balance first
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 5s fall 4 rise 2 on-marked-down shutdown-sessions
    server db-0 10.0.0.100:5432 maxconn 500 check port 8008
    server db-1 10.0.0.101:5432 maxconn 500 check port 8008
    server db-2 10.0.0.102:5432 maxconn 500 check port 8008

listen replica
    bind *:5433
    balance leastconn
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 3 on-marked-down shutdown-sessions
    server db-0 10.0.0.100:5432 maxconn 500 check port 8008
    server db-1 10.0.0.101:5432 maxconn 500 check port 8008
    server db-2 10.0.0.102:5432 maxconn 500 check port 8008
