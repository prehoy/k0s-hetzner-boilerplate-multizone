- name: Install k0s on non-main managers
  hosts: k0s_controllers
  become: true
  gather_facts: true
  vars:
    internal_ip: "{{ ansible_enp7s0.ipv4.address }}"
  tasks:
    - name: Update package lists and upgrade
      apt:
        update_cache: true
        upgrade: true
      when: inventory_hostname != groups['k0s_controllers'][0]

    # NON-MAIN MANAGERS
    - name: Handle non-main controller k0s
      block:
        - name: Check if k0s is installed
          stat:
            path: /usr/local/bin/k0s
          register: k0s

        # k0s already installed
        - name: Print if k0s is installed or not
          debug:
            msg: "k0s is installed"
          when: k0s.stat.exists
        # if k0s is installed, stop and reset:
        - name: Stop k0s service if running
          command: k0s stop
          when: k0s.stat.exists
          failed_when: false
          ignore_errors: true
        - name: Reset k0s configuration
          command: k0s reset
          when: k0s.stat.exists
          ignore_errors: true
        # k0s not installed
        - name: Print that k0s is NOT installed
          debug:
            msg: "k0s is NOT installed"
          when: not k0s.stat.exists

        # MANUAL DOWNLOAD NEEDED DUE TO AUTO INSTALL BUG
        - name: Install k0s
          command: wget https://github.com/k0sproject/k0s/releases/download/v1.34.3+k0s.0/k0s-v1.34.3+k0s.0-amd64
          when: not k0s.stat.exists

        - name: Make k0s executable
          command: chmod +x k0s-v1.34.3+k0s.0-amd64
          when: not k0s.stat.exists

        - name: Move k0s to /usr/local/bin
          command: mv k0s-v1.34.3+k0s.0-amd64 /usr/local/bin/k0s
          when: not k0s.stat.exists

        - name: Create directory for k0s configuration
          file:
            path: /etc/k0s
            state: directory
            owner: root
            group: root
            mode: 0755

        - name: Create configuration file
          template:
            src: ./templates/k0s.yaml.j2
            dest: /etc/k0s/k0s.yaml
            owner: root
            group: root
            mode: 0644
      when: inventory_hostname != groups['k0s_controllers'][0]
    #END OF NON-MAIN MANAGERS

    - name: Generate token with main controller
      command: k0s token create --role=controller --expiry=1h
      register: token_output
      changed_when: false
      run_once: true
      when: inventory_hostname == groups['k0s_controllers'][0]

    - name: Save controller token as fact
      set_fact:
        k0s_controller_token: "{{ token_output.stdout }}"
      run_once: true

    - name: Copy controller token to other controllers
      copy:
        content: "{{ k0s_controller_token }}"
        dest: /tmp/k0s-controller.token
        owner: root
        group: root
        mode: "0600"
      when: inventory_hostname != groups['k0s_controllers'][0]

    - name: Ship direct egress-selector config
      copy:
        dest: /etc/k0s/egress-direct.yaml
        owner: root
        group: root
        mode: 0644
        content: |
          apiVersion: apiserver.k8s.io/v1beta1
          kind: EgressSelectorConfiguration
          egressSelections:
          - name: cluster
            connection:
              proxyProtocol: Direct

    - name: Install k0s controller
      command: k0s install controller --enable-worker --no-taints --disable-components=konnectivity-server --token-file /tmp/k0s-controller.token -c /etc/k0s/k0s.yaml
      when: inventory_hostname != groups['k0s_controllers'][0]

    - name: Start k0s
      command: k0s start
      when: inventory_hostname != groups['k0s_controllers'][0]

    - name: Wait for k0s to start
      wait_for:
        port: 6443
        host: "{{ internal_ip }}"
        timeout: 600
      when: inventory_hostname != groups['k0s_controllers'][0]
